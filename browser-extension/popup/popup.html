<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MagpieAuth</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- CONNECTING VIEW - Shown while checking connection status       -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="connecting-view" class="view active">
    <div class="view-content center-content">
      <div class="status-icon connecting">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
      <h2>Connecting...</h2>
      <p class="subtitle">Looking for MagpieAuth</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- OFFLINE VIEW - App is not running                              -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="offline-view" class="view">
    <div class="view-content center-content">
      <div class="status-icon offline">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h2>MagpieAuth Offline</h2>
      <p class="subtitle">The desktop app is not running</p>
      <div class="offline-actions">
        <button id="btn-launch" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Launch MagpieAuth
        </button>
        <button id="btn-retry" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Retry Connection
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LOCKED VIEW - Pattern lock screen                              -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="locked-view" class="view">
    <div class="view-content center-content">
      <div class="lock-header">
        <div class="status-icon locked">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2>Unlock Vault</h2>
        <p class="subtitle">Draw your pattern to unlock</p>
      </div>
      <div id="pattern-lock-container">
        <canvas id="pattern-canvas" width="260" height="260"></canvas>
      </div>
      <p id="pattern-error" class="error-text" style="display: none;">
        Invalid pattern. Try again.
      </p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- VAULT VIEW - Main vault interface                              -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="vault-view" class="view">
    <!-- Header -->
    <div class="vault-header">
      <div class="vault-title-row">
        <div class="vault-brand">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>MagpieAuth</span>
        </div>
        <div class="vault-status-dot online" title="Connected"></div>
      </div>
      <!-- Search -->
      <div class="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search vault..." autocomplete="off" spellcheck="false">
        <button id="search-clear" class="search-clear" style="display: none;" title="Clear search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Vault Items List -->
    <div id="vault-items" class="vault-items">
      <!-- Items are rendered dynamically by popup.js -->
    </div>

    <!-- Empty state -->
    <div id="vault-empty" class="vault-empty" style="display: none;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
      <p>No items found</p>
    </div>

    <!-- Loading state -->
    <div id="vault-loading" class="vault-loading" style="display: none;">
      <div class="spinner"></div>
      <p>Loading vault...</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- TOAST NOTIFICATION                                             -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <div id="toast" class="toast">
    <span id="toast-message">Copied!</span>
  </div>

  <!-- Scripts -->
  <script src="../lib/api-client.js"></script>
  <script src="../lib/pattern-lock.js"></script>
  <script src="popup.js"></script>
</body>
</html>
